services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: campuseats
      POSTGRES_USER: campuseats
      POSTGRES_PASSWORD: campuseats
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campuseats -d campuseats"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgres://campuseats:campuseats@db:5432/campuseats
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    depends_on:
      - server

volumes:
  pgdata:
  server_node_modules:
  client_node_modules: